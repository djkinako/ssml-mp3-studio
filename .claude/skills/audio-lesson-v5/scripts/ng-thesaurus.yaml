# v1.6.4 PATTERN_13: 既知 NG 熟語辞書(リテラルのみ・メタ文字禁止)
#
# ═══════════════════════════════════════════════════════════════════
# 🚨 凍結宣言(v1.6.4〜)
# ═══════════════════════════════════════════════════════════════════
#
# 【凍結ルール】
#   v1.6.4 以降、本ファイルへの新規エントリ追加は **禁止**。
#   削除のみ可。
#   v1.7.0 で動的フィルタ(教育部辭典 + Sinica Corpus 連携)へ移行予定。
#
# 【凍結の根拠 — N=1 自己権威化の構造的解消】
#   v1.6.0〜v1.6.3 では「林老師(native-checker-v1)が NG 判定 → 即時追加」
#   というプロセスを採用していたが、林老師自体が単一 LLM(Sonnet/Opus)
#   による N=1 観測であり、観測者バイアスが構造的に混入していた。
#   実例: 「在班上」エントリ(Issue #22 起点、v1.5.0 出力で観測)は
#   N=1 林老師A(Sonnet)の hallucination による誤登録であった。
#
# 【教育部公式裏取り根拠】
#   - 教育部國語辭典《重編國語辭典修訂本》兩岸常用詞語對照表:
#     https://dict.revised.moe.edu.tw/
#     → 「班裡=大陸、班上=台湾」と明記
#   - Academia Sinica Balanced Corpus of Modern Chinese:
#     http://asbc.iis.sinica.edu.tw/
#     → 「在班上」=台湾標準、「在班裡」=台湾でほぼ未使用 確認
#   - 質的観察(PTT/Dcard 投稿):
#     「在班上」が口語・書面ともに台湾標準として使用されていることを確認
#
# 【v1.7.0 への移行設計】
#   - 静的 yaml 辞書 → 教育部辭典 API + Sinica Corpus 頻度照合の動的フィルタへ
#   - N=1 林老師判定は「候補抽出」のみに格下げ、最終判定はコーパス頻度ベース
#   - 詳細: tmp/v1.6.1-design/DESIGN.md(過去版)+ v1.7.0 設計時に更新
#
# ═══════════════════════════════════════════════════════════════════
#
# 設計書: tmp/v1.6.0-design/DESIGN.md ④(初版), tmp/v1.6.4-staging/(凍結)
# 用途: lint.sh PATTERN_13 で参照、台湾華語として不自然な熟語を grep -F 検出
#
# 制約:
#   - リテラル熟語のみ(部分文字列マッチでなく word 一致でもなく、grep -F で部分一致)
#   - メタ文字禁止: . ( ) * + ? [ ] { } | \ ^ $
#     → 含めば lint 自体が起動拒否(yaml 読み込み時バリデーション)
#   - 上限 100 語(v1.6.4 で凍結により実質意味なし、削除のみ可)
#   - カテゴリ毎 30 語(同上)
#
# カテゴリ:
#   taiwanese-unnatural: 文法的に通じるが台湾華語として違和感のある言い回し
#   mainland-only:       大陸固有の言い回し(台湾では使わない or 別語あり)
#   japanese-only:       日本固有の表現を中国語に直訳しただけのもの
#
# 削除プロセス(v1.6.4〜、追加プロセスは廃止):
#   1. 教育部辭典 / Sinica Corpus / PTT・Dcard 質的観察で「実は台湾標準」と判明
#   2. evidence(公式ソース URL or コーパス頻度根拠)必須
#   3. 削除理由を本コメントヘッダ末尾の「削除履歴」に追記
#
# 【削除履歴】
#   - 2026-06-18 v1.6.4: 「在班上」削除
#     根拠: 教育部辭典《兩岸常用詞語對照表》で「班裡=大陸、班上=台灣」明記、
#           Sinica Corpus で台湾頻出、Issue #31 + WebSearch 4 ソース裏取りで確定。
#           N=1 林老師A(Issue #22 Sonnet)起源の hallucination と判明。
#           linlaoshi-prompt.md L11-12 の例示も同根のため別タスクで削除予定。
#
# allowlist との関係:
#   - Issue 本文 / Phase 0 サマリ表に登場する語は --allowlist 経由でスルー
#   - 「衆議院」「博多」のような固有名詞・学習対象は allowlist で構造的に弾く

ng_thesaurus:
  # ─── taiwanese-unnatural(台湾華語として不自然) ───
  # (v1.6.4 で「在班上」を削除。教育部辭典で台湾標準と確定)

  - word: "搞活動"
    category: "taiwanese-unnatural"
    added_by: "Lin-Laoshi"
    added_at: "2026-06-17"
    evidence: "『搞』は台湾華語では低俗ニュアンス、『辦活動』が標準"
    replacement_examples:
      - "辦活動"
      - "舉辦活動"

  # ─── mainland-only(大陸固有の言い回し) ───
  - word: "視頻"
