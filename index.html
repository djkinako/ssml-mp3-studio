<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SSML MP3 Studio</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="container">
    <header>
      <h1>🔊 SSML MP3 Studio <span id="version" class="version"></span></h1>
      <p class="subtitle">SSML を貼って、日中混在の学習音声を MP3 で書き出す</p>
    </header>

    <!-- API キー -->
    <section class="card">
      <h2>1. Google TTS API キー</h2>
      <div class="row">
        <input type="password" id="apiKey" placeholder="API キーを貼り付け" autocomplete="off" />
        <button id="saveKey" class="btn-secondary">保存</button>
        <button id="clearKey" class="btn-secondary">クリア</button>
      </div>
      <p class="hint" id="keyStatus">キーは未保存です（このブラウザの localStorage にのみ保存されます）</p>
    </section>

    <!-- 声の設定 -->
    <section class="card">
      <h2>2. 声の設定</h2>
      <div class="grid">
        <label>
          日本語の声
          <select id="jaVoice">
            <option value="ja-JP-Wavenet-B">日本語 女性 (Wavenet-B)</option>
            <option value="ja-JP-Wavenet-A">日本語 女性 (Wavenet-A)</option>
            <option value="ja-JP-Wavenet-C">日本語 男性 (Wavenet-C)</option>
            <option value="ja-JP-Wavenet-D">日本語 男性 (Wavenet-D)</option>
            <option value="ja-JP-Neural2-B">日本語 女性 (Neural2-B)</option>
          </select>
        </label>
        <label>
          中国語の声
          <select id="zhVoice">
            <option value="cmn-TW-Wavenet-A">台湾華語(繁) 女性 (Wavenet-A)</option>
            <option value="cmn-TW-Wavenet-B">台湾華語(繁) 男性 (Wavenet-B)</option>
            <option value="cmn-TW-Wavenet-C">台湾華語(繁) 男性 (Wavenet-C)</option>
            <option value="cmn-CN-Wavenet-A">大陸普通話(簡) 女性 (Wavenet-A)</option>
            <option value="cmn-CN-Wavenet-B">大陸普通話(簡) 男性 (Wavenet-B)</option>
          </select>
        </label>
        <label>
          日本語の速度 <span id="jaRateVal">1.0</span>
          <input type="range" id="jaRate" min="0.5" max="1.5" step="0.05" value="1.0" />
        </label>
        <label>
          中国語の速度 <span id="zhRateVal">1.0</span>
          <input type="range" id="zhRate" min="0.5" max="1.5" step="0.05" value="1.0" />
        </label>
      </div>
      <p class="hint">※ SSML 内の <code>&lt;lang xml:lang="zh-…"&gt;</code> で囲まれた中国語部分が、自動で「中国語の声」＋「中国語の速度」に切り替わります。台湾華語を学ぶなら Claude に<strong>繁体字</strong>で SSML を作ってもらうのがおすすめ。</p>
    </section>

    <!-- SSML 入力 -->
    <section class="card">
      <h2>3. SSML を貼る</h2>
      <textarea id="ssml" rows="12" spellcheck="false"></textarea>
      <div class="row">
        <button id="sampleBtn" class="btn-secondary">サンプル投入</button>
        <span class="hint" id="byteCount">0 バイト / 約5000バイト上限</span>
      </div>
    </section>

    <!-- 生成 -->
    <section class="card">
      <button id="generate" class="btn-primary">🔊 MP3 生成</button>
      <p class="status" id="status"></p>
      <div id="result" class="hidden">
        <audio id="player" controls></audio>
        <a id="download" class="btn-primary" download="ssml-output.mp3">⬇ ダウンロード</a>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
