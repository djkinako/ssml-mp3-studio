name: 🎧 中国語学習音声 SSML 生成依頼
description: 日本語+台湾華語(繁体字)のペアから学習用 SSML を生成する
title: "[Audio Lesson] "
labels: ["audio-lesson"]
body:
  - type: markdown
    attributes:
      value: |
        ## 使い方
        1. 下の欄に **日本語文 + 台湾華語(繁体字)文のペア** を入力(複数可、`---` 区切り)
        2. **プロンプトモード**を選択(v4 = シンプル全部入り / v5-modular = モジュール式深掘り)
        3. v5-modular なら **モジュール選択**(漢字書取/語彙/文法 のどれを出すか)
        4. Issue を起票したらコメントで「対応して」or Claude Code 起動
        5. Claude Code が指定モードで SSML を生成し、このIssueに貼る
        6. 生成された SSML をコピー → [SSML MP3 Studio](https://djkinako.github.io/ssml-mp3-studio/) に貼って MP3 ダウンロード

        ※ MP3 生成は自動化されません(ブラウザで手作業)。これは vibe coding 流儀で意図的にシンプル化。

  - type: dropdown
    id: prompt-mode
    attributes:
      label: プロンプトモード (v1.2.0+)
      description: |
        どのプロンプトで生成するか選択。
        - **v4(シンプル)**: 1 ペア = 1 SSML(例文→ヒント→正解→解説→リピート)
        - **v5-modular(モジュール式)**: 1 ペア = 最大4ブロック(v4 ベース + 漢字書取 + 語彙 + 文法)、ながら聞き深掘り教材向き
      options:
        - "v5-modular(モジュール式・推奨)"
        - "v4(シンプル全部入り)"
      default: 0
    validations:
      required: false

  - type: checkboxes
    id: modules
    attributes:
      label: 出力モジュール選択(v5-modular の時のみ有効)
      description: |
        v5-modular モードで、出力するモジュールを選ぶ。
        全部チェックがデフォルト推奨(漢字書取↔語彙の連動が活きる)。
        v4 モードを選んだ場合、この欄の選択は無視される。
      options:
        - label: "Phase 1: ベース SSML(例文→ヒント→正解→解説→リピート、必須)"
          required: false
        - label: "Phase 2: 漢字書取モジュール(コア4単語の書き方解説)"
          required: false
        - label: "Phase 3: 語彙深掘りモジュール(コア4単語の意味・派生・用法)"
          required: false
        - label: "Phase 4: 文法モジュール(構文・文末詞 最大3ポイント)"
          required: false

  - type: textarea
    id: lesson-pairs
    attributes:
      label: 例文ペア(複数可、`---` 区切り)
      description: |
        日本語と中国語(台湾華語、繁体字)のペアを記述。複数の例文は `---` で区切る。
        中国語は **繁体字** で書くこと(簡体字で書くと変換されない)。
      placeholder: |
        日本語: もし時間があれば、ちょっと手伝ってほしいんだけど
        中国語: 如果有時間的話，能不能幫我一下？
        ---
        日本語: 彼は何があっても諦めない
        中国語: 他無論如何都不會放棄
      render: markdown
    validations:
      required: true

  - type: dropdown
    id: pace-of-pause
    attributes:
      label: 考える時間(ヒント後のポーズ)
      description: ヒントを聴いた後の「考える時間」のポーズ秒数を選ぶ
      options:
        - "標準 (4秒) — プロンプト v4 のデフォルト"
        - "短め (3秒) — テンポ重視"
        - "長め (6秒) — じっくり考えたい時"
      default: 0
    validations:
      required: false

  - type: dropdown
    id: source-type
    attributes:
      label: ソース種別 (v1.1.0+)
      description: 「Netflix・字幕」を選ぶと、翻訳意図の補足解説が強めに入る
      options:
        - "オリジナル / 教科書(直訳ベース)"
        - "Netflix・映画・ドラマ字幕(意訳補足を期待)"
        - "ニュース・記事"
        - "歌詞・詩"
      default: 0
    validations:
      required: false

  - type: textarea
    id: notes
    attributes:
      label: メモ(任意)
      description: "特別な指示や、特定の解説観点(例: 「成語より構文を厚めに」「副詞のニュアンス重視」など)があれば"
      placeholder: |
        例: この回は特に「把構文」と「被構文」の対比を意識した解説にしてほしい
    validations:
      required: false
